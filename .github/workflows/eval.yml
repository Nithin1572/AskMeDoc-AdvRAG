name: RAG Evaluation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports and syntax
        run: |
          python -c "import yaml; import json; print('Config imports OK')"
          python -c "open('config.yaml'); print('config.yaml found')"
          python -c "open('prompts.yaml'); print('prompts.yaml found')"
          python -c "open('eval_dataset.json'); print('eval_dataset.json found')"